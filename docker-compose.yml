services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: pokedex-demo
    container_name: pokedex-demo
    ports:
      - "3000:3000"
    command: npx next dev -H 0.0.0.0
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
